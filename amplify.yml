# AWS Amplify build spec — must live at REPO ROOT (same level as package.json).
# Fixes empty "Build command" and output directory "/" in the Amplify console.
#
# After pushing this file, redeploy. In Amplify Console → Build settings you should see
# these commands instead of blank fields. Platform must be Web Compute + Next.js SSR.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - node --version
        - npm ci
        - npx prisma generate
    build:
      commands:
        # Amplify console env vars are build-time only; write into .env.production
        # so Next.js SSR / API routes can read them at runtime (Web Compute).
        - env | grep -e ACCESS_CODE -e DATABASE_URL -e INGEST_SECRET -e CRON_SECRET -e NEXT_PUBLIC_CRON_SECRET -e ANTHROPIC_API_KEY -e APIFY_TOKEN -e AUTH_SECRET -e OWNER_EMAIL -e OWNER_PASSWORD -e LINKEDIN_VIA_APP >> .env.production || true
        - |
          if [ -n "$DATABASE_URL" ]; then
            for i in 1 2 3; do
              npx prisma db push --accept-data-loss && npm run db:seed && break
              echo "Attempt $i failed, retrying in 10s..."
              sleep 10
            done
          else
            echo "WARN: DATABASE_URL not set — skipping prisma db push/seed"
          fi
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
